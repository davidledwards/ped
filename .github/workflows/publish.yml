name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: write-all
    env:
      GH_TOKEN: ${{ secrets.PAT }}

    steps:
      - uses: actions/checkout@v4
      - name: Trigger publish for Homebrew
        run: |
          TAG=$(gh release view --json tagName --jq ".tagName")
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "VERSION=${TAG:1}" >> $GITHUB_ENV

      #     gh api --method POST \
      #       -H "Accept: application/vnd.github+json" \
      #       -H "X-GitHub-Api-Version: 2022-11-28" \
      #       /repos/davidledwards/homebrew-ped/dispatches \
      #       -f "event_type=publish" \
      #       -F "client_payload[tag]=${TAG}"

      - name: Checkout Homebrew tap repository
        uses: actions/checkout@v4
        with:
          repository: davidledwards/homebrew-ped
          path: homebrew-ped
          token: ${{ secrets.PAT }}

      - name: Download release artifacts
        run: |
          mkdir artifacts
          gh release download ${{ env.TAG }} \
            --repo ${{ github.repository }} \
            --dir artifacts

      - name: Update Homebrew formula
        run: |
          FORMULA=homebrew-ped/Formula/ped.rb
          # sed -i "s/version \".*\"/version \"${{ env.VERSION }}\"/" $FORMULA
          sed -i "s/version \".*\"/version \"1.2.3\"/" $FORMULA

          TARGETS=(\
            "aarch64-apple-darwin" \
            "x86_64-apple-darwin" \
            "x86_64-unknown-linux-gnu" \
            "i686-unknown-linux-gnu")

          for TARGET in "${TARGETS[@]}"
          do
            SHA=$(cut -d ' ' -f1 artifacts/ped-${{ env.VERSION }}-${TARGET}.tar.gz.sha256)
            sed -i "s/sha256 \".*\" # ${TARGET}/sha256 \"${SHA}\" # ${TARGET}/" $FORMULA
          done

      - name: Commit and push changes
        run: |
          cd homebrew-ped
          git config user.name "David Edwards [bot]"
          git config user.email "david.l.edwards@gmail.com"

          BRANCH=release/${{ env.VERSION }}
          echo "BRANCH=${BRANCH}" >> $GITHUB_ENV

          git checkout -b $BRANCH
          git add Formula/ped.rb
          git commit -m "prepare for release ${{ env.VERSION }}"
          git push origin $BRANCH
        env:
          GH_TOKEN: ${{ secrets.PAT }}

      - name: Open pull request
        run: |
          gh pr create \
            --repo davidledwards/homebrew-ped \
            --head ${{ env.BRANCH }} \
            --base main \
            --title "Prepare for release ${{ env.VERSION }}" \
            --body "Ready to publish release ${{ env.VERSION }}."
        env:
          GH_TOKEN: ${{ secrets.PAT }}
